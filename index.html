<!DOCTYPE html>
<html lang="en">
<head>
    <title>Fun Cat Page</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="container mt-4">
    <!-- Header section: contains the main title and intro text for the page -->
    <header class="text-center mb-4">
        <h1>Welcome to the Fun Cat Page</h1>
        <p>Learn some fun facts about cats!</p>
    </header>

    <!-- Main content area -->
    <main>
            <div class="row">
                <!-- Favorite Breeds Section -->
                <section id="favorite-breeds" class="col-md-6">
                    <h2>My Favorite Cat Breeds</h2>
                    <ul>
                        <li>Persian Cats</li>
                        <li>Maine Coon Cats</li>
                        <li>Siamese Cats</li>
                    </ul>
                </section>


                <!-- Cat Activities Section -->
                <section id="cat-activities" class="col-md-6 mb-4">
                    <h2>Cat Activities</h2>
                    <ol>
                        <li>Chasing toys</li>
                        <li>Sleeping</li>
                        <li>Climbing cat trees</li>
                    </ol>


                    <!-- Image of a cute cat -->
                    <img src="images/CuteCat2.png"
                        alt="A cute orange cat outside among flowers and leaves with doodles around it"
                        class="img-fluid">
                </section>
            </div>
        </main>

        <!-- Footer section: navigation to the next page with more cat content -->
        <footer class="mt-5 text-center">
            <p>Learn More About Cats!</p>
            <a href="page2.html" class="btn btn-primary">Learn more fun cat facts on Page 2</a>
        </footer>
    </div>
</body>
</html>
